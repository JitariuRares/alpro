services:
  db:
    image: postgres:16
    container_name: alpro-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ocr_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  alpr-ml:
    build:
      context: ./alpr-ml
      dockerfile: Dockerfile
    container_name: alpro-alpr-ml
    environment:
      OMP_NUM_THREADS: "1"
      YOLO_CONFIG_DIR: "/tmp"
      VIDEO_MIN_CONFIDENCE: ${VIDEO_MIN_CONFIDENCE:-0.70}
      VIDEO_EMIT_MIN_FRAME_GAP: ${VIDEO_EMIT_MIN_FRAME_GAP:-12}
    ports:
      - "8000:8000"
    volumes:
      - alpr_ml_cache:/root/.cache
      - alpr_ml_paddle:/root/.paddleocr
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s

  backend:
    build:
      context: ./ocrbackend
      dockerfile: Dockerfile
    container_name: alpro-backend
    depends_on:
      db:
        condition: service_healthy
      alpr-ml:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ocr_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OPENAI_API_KEY: ${OPENAI_API_KEY_DOCKER:-}
      ALPR_ML_BASE_URL: http://alpr-ml:8000
      ALPR_ML_VIDEO_TIMEOUT_SECONDS: ${ALPR_ML_VIDEO_TIMEOUT_SECONDS:-600}
      ALPR_VIDEO_MIN_CONFIDENCE: ${ALPR_VIDEO_MIN_CONFIDENCE:-0.70}
      ALPR_VIDEO_MIN_FRAME_GAP_PER_TRACK: ${ALPR_VIDEO_MIN_FRAME_GAP_PER_TRACK:-12}
      ALPR_FALLBACK_OPENAI_ENABLED: ${ALPR_FALLBACK_OPENAI_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-jwt-secret-min-32-chars}
      AUTH_PUBLIC_REGISTER_ALLOWED_ROLES: ${AUTH_PUBLIC_REGISTER_ALLOWED_ROLES:-PARKING}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      APP_UPLOAD_DIR: ${APP_UPLOAD_DIR:-/app/uploads}
      APP_MAX_UPLOAD_FILE_SIZE: ${APP_MAX_UPLOAD_FILE_SIZE:-200MB}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./ocr-frontend
      dockerfile: Dockerfile
    container_name: alpro-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
  alpr_ml_cache:
  alpr_ml_paddle:
  backend_uploads:
