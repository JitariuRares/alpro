spring.application.name=ocrbackend
spring.servlet.multipart.max-file-size=${APP_MAX_UPLOAD_FILE_SIZE:200MB}
spring.servlet.multipart.max-request-size=${APP_MAX_UPLOAD_FILE_SIZE:200MB}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ocr_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

openai.api.key=${OPENAI_API_KEY:}
alpr.ml.base-url=${ALPR_ML_BASE_URL:http://localhost:8000}
alpr.ml.video-timeout-seconds=${ALPR_ML_VIDEO_TIMEOUT_SECONDS:600}
alpr.video.min-confidence=${ALPR_VIDEO_MIN_CONFIDENCE:0.70}
alpr.video.min-frame-gap-per-track=${ALPR_VIDEO_MIN_FRAME_GAP_PER_TRACK:12}
alpr.fallback.openai.enabled=${ALPR_FALLBACK_OPENAI_ENABLED:false}
jwt.secret=${JWT_SECRET:dev-only-change-this-jwt-secret-min-32-chars}
auth.public-register.allowed-roles=${AUTH_PUBLIC_REGISTER_ALLOWED_ROLES:PARKING}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.upload-dir=${APP_UPLOAD_DIR:uploads}
